<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="color-scheme" content="light only"/>
<link rel="manifest" href="manifest.json"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="The Daily Hardwood"/>

<title>The Daily Hardwood</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;color:inherit;}
:root{color-scheme:light only;}
html{background:#ffffff!important;color:#E85D04!important;}
h1,h2,h3,h4,h5,h6,p,span,div,a,li,td,th,label,button:not(.vote-btn):not(.reveal-btn):not(.log-btn){color:#E85D04;}
.vote-btn{color:#E85D04;}
.reveal-btn{color:#E85D04;}
.log-btn{color:#E85D04;}
body{font-family:Georgia,serif;background:#ffffff!important;color:#E85D04!important;-webkit-font-smoothing:antialiased;color-scheme:light only;}
.wrap{max-width:860px;margin:0 auto;padding:0 20px 60px;}
.scr{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.scr::-webkit-scrollbar{display:none;}
.sec{padding:20px 0;border-bottom:1px solid #f5d9c8;}
.sec:last-child{border-bottom:none;}
.tag{font-size:9px;font-weight:700;letter-spacing:2px;color:#E85D04;margin-bottom:6px;text-transform:uppercase;}
.date-line{font-size:10px;color:#c94f00;margin-bottom:12px;}
.hl{font-size:28px;font-weight:900;font-family:'Playfair Display',serif;line-height:1.1;margin-bottom:12px;color:#E85D04;}
.deck{font-size:14px;line-height:1.78;color:#b84800;font-style:italic;margin-bottom:12px;font-family:'Playfair Display',serif;}
.rule{height:2px;background:#E85D04;width:36px;margin-bottom:14px;}
.body-p{font-size:14px;line-height:1.78;color:#E85D04;margin-bottom:.9em;}
.body-p:last-child{margin-bottom:0;}
.src-bar{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px;align-items:center;}
.src-lbl{font-size:9px;font-weight:700;color:#c94f00;letter-spacing:1px;margin-right:2px;}
.src-pill{font-size:10px;background:#fff5ef;border:1px solid #f5b899;border-radius:3px;padding:2px 7px;color:#c94f00;cursor:help;}
.pill{font-size:10px;background:#fff5ef;border:1px solid #f5b899;border-radius:3px;padding:2px 7px;color:#c94f00;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:24px;}
.g2b{display:grid;grid-template-columns:1fr 1fr;gap:0;}
.lg{display:grid;grid-template-columns:1fr 210px;gap:24px;align-items:start;}
.card{padding:14px;cursor:pointer;border-right:1px solid #f5d9c8;border-bottom:1px solid #f5d9c8;transition:background .1s;}
.card:hover{background:#fff8f4;}
.stories-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;border:1px solid #f5d9c8;}
.score-card{flex-shrink:0;min-width:136px;border:1px solid #f5d9c8;border-radius:3px;padding:8px 12px;background:#fff;}
.score-card.live{border-left:4px solid #E85D04;background:#fff8f4;}
.score-row{display:flex;justify-content:space-between;font-size:12px;color:#E85D04;}
.score-row .bold{font-weight:700;color:#E85D04;}
.km-box{padding:8px 12px;background:#fff5ef;border-left:3px solid #E85D04;font-size:12px;font-style:italic;color:#c94f00;margin-bottom:8px;}
.rank-row{display:flex;align-items:center;gap:12px;padding:9px 0;border-top:1px solid #f5d9c8;}
.rank-row:first-child{border-top:none;}
.rank-num{font-size:17px;font-weight:900;font-family:'Playfair Display',serif;min-width:18px;color:#f5b899;}
.reaction-card{border:1px solid #f5d9c8;border-radius:3px;padding:13px 14px;border-top:3px solid #E85D04;background:#fff;}
.plat-badge{font-size:10px;font-weight:700;color:#fff;padding:2px 7px;border-radius:3px;}
.vote-btn{padding:9px 14px;border:1px solid #f5d9c8;background:#fff;color:#E85D04;cursor:pointer;font-family:Georgia,serif;font-size:13px;text-align:left;border-radius:2px;width:100%;margin-bottom:8px;transition:all .15s;}
.vote-btn.active{border-color:#E85D04;background:#fff5ef;color:#E85D04;font-weight:700;}
.reveal-btn{font-size:11px;color:#E85D04;border:1px solid #E85D04;background:transparent;padding:5px 12px;cursor:pointer;border-radius:2px;font-family:Georgia,serif;}
.log-btn{font-size:10px;color:#E85D04;border:1px solid #f5b899;background:#fff5ef;padding:3px 14px;border-radius:20px;cursor:pointer;font-family:Georgia,serif;}
.f1-card{flex-shrink:0;min-width:152px;border:1px solid #f5d9c8;border-radius:3px;padding:8px 12px;background:#fff;}
.f1-card.winner{border-left:4px solid #E85D04;background:#fff5ef;}
.f1-dnf{flex-shrink:0;min-width:152px;border:1px solid #f5d9c8;border-radius:3px;padding:8px 12px;background:#fff8f4;}
.ncaa-seed{padding:8px 12px;border:1px solid #f5d9c8;border-radius:3px;border-left:3px solid #E85D04;background:#fff5ef;margin-bottom:8px;}
.ncaa-out{padding:8px 12px;background:#fff8f4;border:1px solid #f5d9c8;border-radius:3px;}
.countdown{margin-top:10px;font-size:10px;color:#c94f00;letter-spacing:.5px;}
img.photo{object-fit:cover;display:block;border:1px solid #f5d9c8;border-radius:2px;}
img.photo-circle{object-fit:cover;display:block;border-radius:50%;border:2px solid #E85D04;flex-shrink:0;}
.quote-wrap{display:flex;gap:16px;align-items:flex-start;}
.quote-bar{border-left:3px solid #E85D04;padding-left:16px;}
blockquote{font-size:16px;font-style:italic;font-family:'Playfair Display',serif;line-height:1.65;color:#E85D04;}
.quote-attr{font-size:11px;color:#c94f00;margin-top:8px;line-height:1.5;}
.take-block{border-left:4px solid #E85D04;padding-left:14px;}
.take-sport{font-size:9px;font-weight:700;color:#c94f00;margin-bottom:5px;letter-spacing:1px;}
.take-hl{font-size:16px;font-weight:900;font-family:'Playfair Display',serif;margin-bottom:8px;line-height:1.2;color:#E85D04;}
.take-body{font-size:13px;color:#b84800;line-height:1.75;}
.otd-year{font-size:32px;font-weight:900;font-family:'Playfair Display',serif;color:#E85D04;line-height:1;}
.game-row{display:flex;gap:14px;padding:11px 0;border-top:1px solid #f5d9c8;align-items:flex-start;}
.game-row:first-child{border-top:none;}
.game-bar{width:3px;min-height:36px;border-radius:2px;flex-shrink:0;margin-top:3px;}
.fact-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;}
.fact-row{font-size:11px;color:#E85D04;line-height:1.5;}
.section-label{font-size:9px;font-weight:700;letter-spacing:2px;color:#c94f00;margin-bottom:12px;text-transform:uppercase;}

.f1-driver-row:first-child{border-top:none;}
.log-panel{margin-top:10px;background:#fff5ef;border:1px solid #f5b899;border-radius:4px;padding:14px 16px;}
.log-title{font-size:10px;font-weight:700;color:#E85D04;letter-spacing:1px;margin-bottom:10px;}
.stat-num{font-size:44px;font-weight:900;font-family:'Playfair Display',serif;color:#E85D04;line-height:1;}
@media(prefers-color-scheme:dark){
  html,body,*{background-color:unset;color:unset;}
  html,body{background:#ffffff!important;color:#E85D04!important;}
}
@media(max-width:640px){
  .g2,.g2b,.lg,.stories-grid{grid-template-columns:1fr!important;}
  .g2b>div:last-child{border-left:none!important;padding-left:0!important;border-top:1px solid #f5d9c8;padding-top:14px;}
  .hm{display:none!important;}
  .hl{font-size:22px!important;}
  .card{border-right:none!important;}
}

  background: none;
  border: 1px solid #f5b899;

  font-family: Georgia, serif;
  font-size: 12px;
  color: #E85D04;

}

<body>
<div id="app"></div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
//  THE DAILY HARDWOOD -- single HTML file, no dependencies
//  Opens directly in any browser. Real Unsplash photos load on a website.
//  Flips to new edition every day at 5:30 AM.
// ─────────────────────────────────────────────────────────────────────────────

const OR = '#E85D04';

// ── EDITION CLOCK ─────────────────────────────────────────────────────────────
function getEditionDay() {
  const now = new Date();
  const offset = new Date(now.getTime() - 5.5 * 60 * 60 * 1000);
  return Math.floor((offset - new Date(offset.getFullYear(), 0, 0)) / 86400000);
}
function getEditionLabel() {
  const now = new Date();
  const mins = now.getHours() * 60 + now.getMinutes();
  const d = mins < 330 ? new Date(now.getTime() - 86400000) : now;
  return d.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric', year:'numeric' });
}
function msUntilNext() {
  const now = new Date(), next = new Date(now);
  next.setHours(5, 30, 0, 0);
  if (next <= now) next.setDate(next.getDate() + 1);
  return next - now;
}

const DOY        = getEditionDay();
const DATE_LABEL = getEditionLabel();
const DATE_ISO = '2026-03-17'; // auto-updated 2026-03-17
function shuffle(arr) {
  const a = [...arr];
  let s = ((DOY + 1) * 2654435769) >>> 0;
  for (let i = a.length - 1; i > 0; i--) {
    s = (Math.imul(s ^ (s >>> 16), 2246822519)) >>> 0;
    s = (Math.imul(s ^ (s >>> 13), 3266489917)) >>> 0;
    s = (s ^ (s >>> 16)) >>> 0;
    const j = s % (i + 1);
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ── IMAGES ────────────────────────────────────────────────────────────────────
// Image system — curated Picsum IDs, backgrounds only, no people
// Each category has a pool of IDs that rotate daily
// Curated Picsum seed strings → always landscapes/architecture, never people
// Seeds are descriptive strings so they map to consistent non-portrait images
const IMG_POOLS = {
  basketball: ['arena-night','court-lights','stadium-dark','hardwood-floor','crowd-blur','arena-empty','sports-venue','gym-light','indoor-arena','court-overhead','arena-seats','sports-hall','basketball-venue','indoor-lights','court-dark'],
  f1:         ['racetrack-aerial','circuit-tarmac','motorsport-track','pit-lane-dark','racing-circuit','track-overhead','asphalt-detail','race-venue','speedway-dark','circuit-night','track-blur','motorsport-venue','racing-track','f1-circuit','race-day'],
  soccer:     ['grass-pitch','stadium-aerial','football-ground','turf-green','pitch-overhead','grass-blur','stadium-empty','soccer-venue','football-pitch','grass-lines','stadium-night','pitch-dark','turf-detail','football-venue','soccer-ground'],
  ncaa:       ['college-arena','campus-night','gymnasium-dark','court-bright','sports-hall','indoor-venue','arena-overhead','college-court','basketball-arena','indoor-court','campus-arena','gym-dark','college-venue','indoor-sports','arena-lights'],
  nfl:        ['football-stadium','gridiron-aerial','stadium-field','sports-complex','end-zone-dark','football-field','stadium-overhead','gridiron-lights','outdoor-stadium','field-blur','stadium-grass','football-venue','gridiron-venue','outdoor-arena','stadium-seats'],
  sports:     ['stadium-blur','arena-dark','sports-venue','crowd-abstract','venue-lights','sports-complex','arena-aerial','stadium-abstract','venue-dark','sports-hall','crowd-dark','arena-blur','sports-night','venue-aerial','stadium-glow'],
  default:    ['dark-abstract','urban-night','city-blur','architecture-dark','dramatic-sky','moody-landscape','urban-aerial','city-glow','abstract-dark','night-city','dramatic-landscape','dark-urban','moody-sky','city-night','urban-glow'],
};

function getCategoryFromQuery(query) {
  const q = (query || '').toLowerCase();
  if (q.includes('basketball') || q.includes('nba') || q.includes('court') || q.includes('college')) return 'basketball';
  if (q.includes('formula') || q.includes('f1') || q.includes('racing') || q.includes('car')) return 'f1';
  if (q.includes('soccer') || q.includes('football') || q.includes('pitch') || q.includes('stadium')) return 'soccer';
  if (q.includes('ncaa') || q.includes('tournament') || q.includes('march')) return 'ncaa';
  if (q.includes('american football') || q.includes('nfl')) return 'nfl';
  if (q.includes('sport') || q.includes('arena') || q.includes('crowd')) return 'sports';
  return 'default';
}

function imgSrc(query, seed, w, h) {
  const cat = getCategoryFromQuery(query);
  const pool = IMG_POOLS[cat] || IMG_POOLS.default;
  const idx = (DOY + seed) % pool.length;
  const seedStr = pool[idx] + '-' + DOY;
  return `https://picsum.photos/seed/${seedStr}/${w}/${h}`;
}
function picsumSrc(seed, w, h) {
  const pool = IMG_POOLS.default;
  const idx = (DOY + seed + 7) % pool.length;
  const seedStr = pool[idx] + '-' + DOY;
  return `https://picsum.photos/seed/${seedStr}/${w}/${h}`;
}
function svgFallback(label, w, h) {
  const s = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}"><rect width="${w}" height="${h}" fill="#fff5ef"/><rect x="0" y="${h-4}" width="${w}" height="4" fill="${OR}"/><text x="${w/2}" y="${h/2}" font-family="Georgia,serif" font-size="${Math.min(w,h)*0.09}" fill="${OR}" text-anchor="middle" dominant-baseline="middle" opacity="0.8">${label}</text></svg>`;
  return 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(s);
}

function makeImg(query, seed, w, h, cls, styleStr, label) {
  const img = document.createElement('img');
  img.src = imgSrc(query, seed, w, h);
  img.alt = label || query;
  img.className = cls || 'photo';
  if (styleStr) img.style.cssText = styleStr;
  let attempt = 0;
  img.onerror = () => {
    attempt++;
    if (attempt === 1) img.src = picsumSrc(seed + 100, w, h);
    else if (attempt === 2) img.src = picsumSrc(seed + 200, w, h);
    else { img.src = svgFallback(label || query, w, h); img.onerror = null; }
  };
  return img;
}

// ─────────────────────────────────────────────────────────────────────────────
//  DATA
// ─────────────────────────────────────────────────────────────────────────────

const NBA_SCORES = [
  { away:'Mavericks',     home:'Cavaliers',  aS:130, hS:120, st:'Final · Mar 15' },
  { away:'Indiana Pacers',home:'Bucks',      aS:123, hS:134, st:'Final · Mar 15' },
  { away:'T-Wolves',      home:'Thunder',    aS:103, hS:116, st:'Final · Mar 15' },

// ── HELPERS ───────────────────────────────────────────────────────────────────
function el(tag, cls, html) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (html !== undefined) e.innerHTML = html;
  return e;
}
function div(cls, html) { return el('div', cls, html); }
function span(cls, html) { return el('span', cls, html); }
function p(cls, html) { return el('p', cls, html); }

function srcBar(sources) {
  const bar = div('src-bar');
  const lbl = span('src-lbl'); lbl.textContent = 'SOURCES'; bar.appendChild(lbl);
  sources.forEach(s => {
    const pill = span('src-pill'); pill.textContent = '✓ ' + s.o;
    if (s.d) pill.title = s.d;
    bar.appendChild(pill);
  });
  return bar;
}

function pillEl(text) {
  const p = span('pill'); p.textContent = text; return p;
}

function scoreCard(g) {
  const card = div('score-card' + (g.live ? ' live' : ''));
  const stLine = div(''); stLine.style.cssText = `font-size:9px;color:${g.live?OR:'#c94f00'};font-weight:${g.live?700:400};margin-bottom:4px;`;
  stLine.textContent = (g.lg ? g.lg + ' · ' : '') + g.st; card.appendChild(stLine);
  const away = div('score-row'); away.innerHTML = `<span>${g.away}</span><span class="bold">${g.aS!=null?g.aS:'--'}</span>`; card.appendChild(away);
  const home = div('score-row'); home.style.marginTop='2px'; home.innerHTML = `<span>${g.home}</span><span class="bold">${g.hS!=null?g.hS:'--'}</span>`; card.appendChild(home);
  return card;
}

function makeSection(id) {
  const s = div('sec'); s.id = id; return s;

    html += '<span style="font-size:10px;font-weight:700;background:#f5d9c8;color:#c94f00;border-radius:2px;padding:1px 6px;min-width:20px;text-align:center;">' + g.s2 + '</span>';
    html += '<span style="font-size:13px;color:#c94f00;">' + g.t2 + '</span></div></div>';
    html += '<div style="text-align:right;min-width:80px;">';
    if (isLive) {
      html += '<span style="font-size:11px;font-weight:700;color:#E85D04;display:block;">' + (g.r||'') + '</span>';
      html += '<span style="font-size:9px;color:#E85D04;font-weight:700;">&#9679; LIVE</span>';
    } else if (hasResult) {
      html += '<span style="font-size:11px;font-weight:700;color:#E85D04;">' + g.r + '</span>';
    } else {
      html += '<span style="font-size:10px;color:#b84800;">' + (g.dt||'Upcoming') + '</span>';
    }
    html += '</div></div>';
    return html;
  }

  function renderBktTab(key) {
    let html = '';
    if (key === 'firstfour') {
      html += '<div style="font-size:11px;font-weight:700;color:#E85D04;letter-spacing:1px;margin-bottom:10px;">FIRST FOUR &mdash; Dayton, OH &mdash; Mar 17-18</div>';
      NCAAT.firstFour.forEach(function(g) {
        const isLive = g.live;
        html += '<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-top:1px solid #f5d9c8;">';
        html += '<div style="flex:1;">';
        html += '<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;">';
        html += '<span style="font-size:10px;font-weight:700;background:#E85D04;color:#fff;border-radius:2px;padding:1px 6px;">' + g.s + '</span>';
        html += '<span style="font-size:13px;font-weight:700;color:#E85D04;">' + g.t1 + '</span></div>';
        html += '<div style="display:flex;align-items:center;gap:6px;">';
        html += '<span style="font-size:10px;font-weight:700;background:#f5d9c8;color:#c94f00;border-radius:2px;padding:1px 6px;">' + g.s + '</span>';
        html += '<span style="font-size:13px;color:#c94f00;">' + g.t2 + '</span></div></div>';
        html += '<div style="text-align:right;min-width:80px;">';
        if (isLive) {
          html += '<span style="font-size:11px;font-weight:700;color:#E85D04;display:block;">' + g.r + '</span>';
          html += '<span style="font-size:9px;color:#E85D04;font-weight:700;">&#9679; LIVE</span>';
        } else if (g.r) {
          html += '<span style="font-size:11px;font-weight:700;color:#E85D04;">' + g.r + '</span>';
        } else {
          html += '<span style="font-size:10px;color:#b84800;">' + g.st + '</span>';
          html += '<div style="font-size:9px;color:#c94f00;margin-top:2px;">' + g.region + ' Region</div>';
        }
        html += '</div></div>';
      });
    } else if (key === 'schedule') {
      html += '<div style="font-size:11px;font-weight:700;color:#E85D04;letter-spacing:1px;margin-bottom:10px;">FULL TOURNAMENT SCHEDULE</div>';
      NCAAT.schedule.forEach(function(s) {
        html += '<div style="display:flex;gap:10px;padding:9px 0;border-top:1px solid #f5d9c8;align-items:flex-start;">';
        html += '<div style="min-width:90px;font-size:11px;font-weight:700;color:#E85D04;">' + s.round + '</div>';
        html += '<div><div style="font-size:12px;color:#E85D04;">' + s.dates + '</div>';
        html += '<div style="font-size:11px;color:#c94f00;">' + s.site + '</div>';
        html += '<div style="font-size:10px;color:#b84800;">' + s.tv + '</div></div></div>';
      });
    } else {
      var r = NCAAT[key];
      if (!r) return;
      html += '<div style="margin-bottom:10px;">';
      html += '<div style="font-size:13px;font-weight:900;color:#E85D04;font-family:Playfair Display,serif;">No. 1 Seed: ' + r.seed1 + ' (' + r.rec + ')</div>';
      html += '<div style="font-size:11px;color:#c94f00;margin-top:2px;">' + r.site + '</div>';
      html += '<div style="font-size:11px;color:#b84800;font-style:italic;margin-top:4px;">' + r.note + '</div></div>';
      html += '<div style="font-size:10px;font-weight:700;color:#b84800;letter-spacing:1px;margin-bottom:4px;">FIRST ROUND MATCHUPS</div>';
      r.games.forEach(function(g) { html += bktGameRow(g); });
    }
    bktPane.innerHTML = html;
  }

  var activeBktTab = 'firstfour';
  var bktTabs = [
    {key:'firstfour', label:'First Four &#9679;'},
    {key:'east',      label:'East'},
    {key:'west',      label:'West'},
    {key:'midwest',   label:'Midwest'},
    {key:'south',     label:'South'},
    {key:'schedule',  label:'Schedule'},
  ];

  bktTabs.forEach(function(t) {
    var btn = el('button', '');
    btn.innerHTML = t.label;
    btn.dataset.bktKey = t.key;
    var isActive = t.key === activeBktTab;
    btn.style.cssText = 'font-size:10px;font-weight:' + (isActive?'700':'400') + ';padding:4px 11px;border-radius:20px;'
      + 'border:1px solid ' + (isActive?'#f5b899':'#f5d9c8') + ';'
      + 'background:' + (isActive?'#fff5ef':'#fff') + ';'
      + 'color:' + (isActive?'#E85D04':'#c94f00') + ';'
      + 'cursor:pointer;font-family:Georgia,serif;margin-bottom:4px;';
    btn.onclick = function() {
      activeBktTab = t.key;
      Array.from(bktTabBar.children).forEach(function(b) {
        var active = b.dataset.bktKey === activeBktTab;
        b.style.fontWeight = active ? '700' : '400';
        b.style.borderColor = active ? '#f5b899' : '#f5d9c8';
        b.style.background = active ? '#fff5ef' : '#fff';
        b.style.color = active ? '#E85D04' : '#c94f00';
      });
      renderBktTab(activeBktTab);
    };
    bktTabBar.appendChild(btn);
  });

  renderBktTab('firstfour');

  var bktFootnote = div('');
  bktFootnote.style.cssText = 'font-size:9px;color:#b84800;margin-top:12px;font-style:italic;line-height:1.6;border-top:1px solid #f5d9c8;padding-top:8px;';
  bktFootnote.textContent = 'First Four: Dayton Mar 17-18  •  First Round: Mar 19-20  •  Second Round: Mar 21-22  •  Sweet 16: Mar 26-27  •  Elite Eight: Mar 28-29  •  Final Four: Apr 4  •  Championship: Apr 6, Indianapolis';
  bktSec.appendChild(bktPane);
  bktSec.appendChild(bktFootnote);
  wrap.appendChild(bktSec);
  // ═══════════════════════════════════════════════════════════════════════════

  // ── REACTIONS ─────────────────────────────────────────────────────────────
  const rxSec = makeSection('reactions');
  const rxTitle = div('section-label'); rxTitle.textContent='SPORTS INTERNET · REACTIONS'; rxSec.appendChild(rxTitle);
  const rxNote = div(''); rxNote.style.cssText='font-size:11px;color:#E85D04333555777;margin-bottom:14px;font-style:italic;'; rxNote.textContent='6 posts daily · Basketball · F1 · Soccer · NFL · Rotates every morning at 5:30 AM'; rxSec.appendChild(rxNote);
  const rxGrid = div('g2');
  reactions.forEach(r=>{
    const card = div('reaction-card');
    const header = div(''); header.style.cssText='color:inherit;display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;';
    const left = div(''); left.style.cssText='color:inherit;display:flex;align-items:center;gap:7px;';
    const badge = span('plat-badge'); badge.style.background=r.plat==='Reddit'?'#FF4500':'#111'; badge.textContent=r.plat; left.appendChild(badge);
    const user = span(''); user.style.cssText='color:inherit;font-size:12px;font-weight:700;'; user.textContent=r.user; left.appendChild(user);
    header.appendChild(left);
    const likes = span(''); likes.style.cssText=`font-size:10px;color:${OR};font-weight:700;`; likes.textContent='♥ '+r.likes; header.appendChild(likes);
    card.appendChild(header);
    const txt = p(''); txt.style.cssText='font-size:13px;line-height:1.65;color:#E85D04;white-space:pre-line;'; txt.textContent=r.txt; card.appendChild(txt);
    rxGrid.appendChild(card);
  });
  rxSec.appendChild(rxGrid);
  wrap.appendChild(rxSec);

  // ── HUMAN INTEREST ────────────────────────────────────────────────────────
  const hiSec = makeSection('human');
  const hiTitle = div('section-label'); hiTitle.textContent='HUMAN INTEREST'; hiSec.appendChild(hiTitle);
  const hiGrid = div('lg');
  const hiLeft = div('');
  const hiHl = el('h2',''); hiHl.style.cssText='color:inherit;font-size:20px;font-weight:900;font-family:"Playfair Display",serif;line-height:1.2;margin-bottom:10px;'; hiHl.textContent=human.hl; hiLeft.appendChild(hiHl);
  human.body.forEach((para,i)=>{ const pp=p('body-p'); if(i<human.body.length-1) pp.style.marginBottom='.8em'; pp.textContent=para; hiLeft.appendChild(pp); });
  const hiPills = div('src-bar'); hiPills.style.marginTop='10px'; human.src.split(', ').forEach(s=>hiPills.appendChild(pillEl(s))); hiLeft.appendChild(hiPills);
  hiGrid.appendChild(hiLeft);
  hiGrid.appendChild(makeImg(human.query, human.seed, 400, 480, 'photo', 'width:100%;height:220px;', human.hl));
  hiSec.appendChild(hiGrid);
  wrap.appendChild(hiSec);

  // ── TRIVIA + DEBATE ───────────────────────────────────────────────────────
  const tdSec = makeSection('trivia-debate');
  const tdGrid = div('g2b');
  // Trivia
  const trivDiv = div(''); trivDiv.style.cssText='color:inherit;padding:20px 20px 20px 0;border-right:1px solid #f5d9c8;';
  const trivTitle = div('section-label'); trivTitle.textContent='TRIVIA'; trivDiv.appendChild(trivTitle);
  const trivQ = p(''); trivQ.style.cssText='color:inherit;font-size:14px;line-height:1.65;margin-bottom:12px;'; trivQ.textContent=trivia.q; trivDiv.appendChild(trivQ);
  const revBtn = el('button','reveal-btn'); revBtn.textContent='Reveal Answer';
  const ansEl = p(''); ansEl.style.cssText=`font-size:13px;color:${OR};margin-top:10px;font-weight:600;line-height:1.5;display:none;`; ansEl.textContent=trivia.a;
  revBtn.onclick = () => { showAnswer=!showAnswer; ansEl.style.display=showAnswer?'block':'none'; revBtn.textContent=showAnswer?'Hide Answer':'Reveal Answer'; };
  trivDiv.appendChild(revBtn); trivDiv.appendChild(ansEl);
  tdGrid.appendChild(trivDiv);
  // Debate
  const debDiv = div(''); debDiv.style.cssText='color:inherit;padding:20px 0 20px 20px;';
  const debTitle = div('section-label'); debTitle.textContent='READER DEBATE'; debDiv.appendChild(debTitle);
  const debQ = p(''); debQ.style.cssText='color:inherit;font-size:14px;font-weight:700;font-family:"Playfair Display",serif;margin-bottom:12px;line-height:1.3;'; debQ.textContent=debate.q; debDiv.appendChild(debQ);
  [debate.a, debate.b].forEach((opt,i)=>{
    const btn = el('button','vote-btn');
    btn.textContent = opt;
    btn.dataset.idx = i;
    btn.onclick = () => {
      voteIdx = i;
      document.querySelectorAll('.vote-btn').forEach(b=>{ b.classList.toggle('active', parseInt(b.dataset.idx)===voteIdx); b.textContent = ALL_DEBATES.find(d=>d.id===debate.id)?.[i===0?'a':'b'] + (parseInt(b.dataset.idx)===voteIdx?' ✓':''); });
    };
    debDiv.appendChild(btn);
  });
  tdGrid.appendChild(debDiv);
  tdSec.appendChild(tdGrid);
  wrap.appendChild(tdSec);

  // ── GAMES TO WATCH ────────────────────────────────────────────────────────
  const gamesSec = makeSection('games');
  const gamesTitle = div('section-label'); gamesTitle.textContent='GAMES TO WATCH'; gamesSec.appendChild(gamesTitle);
  games.forEach((g,i)=>{
    const row = div('game-row');
    const bar = div('game-bar'); bar.style.background=i===0?OR:'#eee'; row.appendChild(bar);
    const info = div(''); info.style.flex='1';
    const top = div(''); top.style.cssText='color:inherit;display:flex;justify-content:space-between;';
    top.innerHTML=`<span style="font-size:14px;font-weight:700;color:#E85D04;">${g.game}</span><span style="font-size:10px;color:#E85D04333555777;font-weight:600;">${g.sport}</span>`;
    info.appendChild(top);
    const time = div(''); time.style.cssText=`font-size:11px;color:${OR};margin-top:2px;`; time.textContent=g.time; info.appendChild(time);
    const why = div(''); why.style.cssText='font-size:12px;color:#E85D04333555;margin-top:2px;'; why.textContent=g.why; info.appendChild(why);
    row.appendChild(info); gamesSec.appendChild(row);
  });
  wrap.appendChild(gamesSec);
  app.appendChild(wrap);

  // ── MARCH MADNESS BRACKET ─────────────────────────────────────────────────
  // bracket built inline below

  // bracket is rendered inline via HTML above

  // ── FOOTER + COUNTDOWN ───────────────────────────────────────────────────
  const footer = div('');
  footer.style.cssText='color:inherit;border-top:2px solid #E85D04;padding:14px 20px 18px;text-align:center;';
  footer.innerHTML=`<div style="font-family:'Playfair Display',serif;font-size:17px;font-weight:900;letter-spacing:-.5px;color:#E85D04;">The Daily Hardwood</div><div style="font-size:9px;color:#c94f00;letter-spacing:2px;margin-top:3px;text-transform:uppercase;">${DATE_LABEL} · Every claim sourced · No story repeats · ESPN · CBS · F1.com · NCAA.org · The Athletic · BBC Sport</div><div class="countdown">Next edition in <span id="cd-timer"></span> · New at 5:30 AM</div>`;
  app.appendChild(footer);

  // Start countdown
  function updateCountdown() {
    const ms = msUntilNext();
    const h = Math.floor(ms/3600000), m = Math.floor((ms%3600000)/60000), s = Math.floor((ms%60000)/1000);
    const pad = n=>String(n).padStart(2,'0');
    const el = document.getElementById('cd-timer');
    if (el) el.textContent = `${pad(h)}:${pad(m)}:${pad(s)}`;
  }
  updateCountdown();
  setInterval(updateCountdown, 1000);
}

try {
  
// ── DARK MODE TOGGLE ─────────────────────────────────────────────────────────
function initDarkMode() {
  const saved = localStorage.getItem('dh-dark');
  const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
  if (saved === 'true' || (saved === null && prefersDark)) {
    document.body.classList.add('dark');
  }
}

function toggleDark() {
  const isDark = document.body.classList.toggle('dark');
  localStorage.setItem('dh-dark', isDark);
  const btn = document.getElementById('dm-btn');
  if (btn) btn.textContent = isDark ? '☀️ Light' : '🌙 Dark';
}

initDarkMode();

buildPage();
} catch(e) {
  document.getElementById('app').innerHTML = '<div style="padding:40px;font-family:monospace;color:#E85D04;background:#fff;font-size:14px;"><strong>JS Error:</strong><br>' + e.message + '<br><br>' + (e.stack||'').replace(/\n/g,'<br>') + '</div>';
}
</script>
